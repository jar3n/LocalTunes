name: Build LocalTunes

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Lets the deploy job publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: brew install ldid xz make

      - name: Checkout Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          submodules: recursive
          path: theos

      - name: Install legacy iOS SDK (needed for armv7)
        run: |
          git clone --depth 1 https://github.com/theos/sdks.git /tmp/sdks
          mkdir -p theos/sdks
          cp -R /tmp/sdks/iPhoneOS9.3.sdk theos/sdks/

      - name: Fix deprecated module.map filenames in SDK
        run: |
          find theos/sdks/iPhoneOS9.3.sdk -name "module.map" | while read f; do
            mv "$f" "$(dirname "$f")/module.modulemap"
          done

      - name: Build .deb
        env:
          THEOS: ${{ github.workspace }}/theos
        run: make package FINALPACKAGE=1

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalTunes-deb
          path: packages/*.deb

      - name: Generate Cydia repo
        run: |
          mkdir -p public
          DEB=$(ls packages/*.deb | head -n1)
          python3 tools/generate_repo.py control "$DEB" public
          cp Resources/Icon@2x.png public/CydiaIcon.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
