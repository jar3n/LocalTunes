name: Build LocalTunes

on:
  push:
    branches: ["**"]
  workflow_dispatch:

# Lets the deploy job publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark as test build on non-main branches
        if: github.ref_name != 'main'
        run: |
          sed -i '' 's/^Name: .*/& (Test)/' control
          sed -i '' 's/^Version: .*/&-test/' control

      # use the docker container instead of
      # dealing with the mac github runner
      - name: Make Build Container
        run: build-in-container.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalTunes-deb
          path: packages/*.deb

      - name: Generate Cydia repo
        run: |
          mkdir -p public
          DEB=$(ls packages/*.deb | head -n1)
          python3 tools/generate_repo.py control "$DEB" public
          cp Resources/Icon@2x.png public/CydiaIcon.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    if: github.ref_name == 'main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
