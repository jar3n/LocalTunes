name: Build LocalTunes

on:
  push:
    branches: ["**"]
  workflow_dispatch:

# Needed for peaceiris/actions-gh-pages to push to gh-pages branch.
permissions:
  contents: write

concurrency:
  group: "${{ github.ref_name }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Mark as test build on non-main branches
        if: github.ref_name != 'main'
        run: |
          sed -i 's/^Name: .*/& (${{ github.ref_name }})/' control
          sed -i 's/^Version: .*/&-${{ github.ref_name }}/' control

      - name: Build inside container
        run: ./build-in-container.sh

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: LocalTunes-deb
          path: packages/*.deb

      - name: Generate Cydia repo
        run: |
          mkdir -p public
          DEB=$(ls packages/*.deb | head -n1)
          python3 tools/generate_repo.py control "$DEB" public
          cp Resources/app_icon_normal.png public/CydiaIcon.png

      - name: Determine deploy directory for Pages
        id: deploy-dir
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "dir=." >> "$GITHUB_OUTPUT"
          else
            echo "dir=test/${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          destination_dir: ${{ steps.deploy-dir.outputs.dir }}
          # Main → clean root deploy (wipes old test subdirs, which is fine).
          # Test branches → preserve other test subdirs.
          keep_files: ${{ github.ref_name != 'main' }}

  bump-version:
    if: github.ref_name == 'main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump version for next release
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          ./bump-version.sh --commit
          git push origin HEAD:main
